<!-- STEP 5: Simple Contact Form with Feedback -->
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Alpine Portfolio - Step 5</title>
  <meta charset="utf-8" />
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <h1>Hi, I'm [Your Name]</h1>
  <section>
    <h2>About Me</h2>
    <p>This is my first portfolio section.</p>
  </section>
  <section>
    <h2>Projects</h2>
    <!-- ...reuse step 3 code here... -->
  </section>
  <section>
    <h2>Theme Toggle</h2>
    <!-- ...reuse step 4 code here... -->
  </section>
  <section x-data="{ name:'', sent:false, submit() { this.sent=true; } }">
    <h2>Contact Me</h2>
    <form @submit.prevent="submit">
      <input x-model="name" placeholder="Name" required>
      <button type="submit">Send</button>
      <span x-show="sent" x-text="`Thanks, ${name}!`" style="margin-left: 1em;"></span>
    </form>
  </section>
</body>
</html>
