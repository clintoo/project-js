<!-- STEP 3: Projects Section (Simulated Fetch) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Alpine Portfolio - Step 3</title>
  <meta charset="utf-8" />
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <h1>Hi, I'm [Your Name]</h1>
  <section>
    <h2>About Me</h2>
    <p>This is my first portfolio section.</p>
  </section>
  <section x-data="{
      projects: [],
      fetchProjects() {
        this.projects = [
          { title: 'Alpine Demo', desc: 'Taught at the workshop.' },
          { title: 'Mini App', desc: 'Built with just HTML & Alpine.' }
        ];
      }
    }" x-init="fetchProjects()">
    <h2>Projects</h2>
    <template x-for="proj in projects" :key="proj.title">
      <div style="border:1px solid #eee; margin:10px 0; padding:10px;">
        <strong x-text="proj.title"></strong>
        <p x-text="proj.desc"></p>
      </div>
    </template>
    <button @click="fetchProjects()">Reload</button>
  </section>
</body>
</html>
